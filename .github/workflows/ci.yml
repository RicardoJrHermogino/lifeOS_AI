name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - staging
      - production
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "docs/**"
  pull_request:
    branches:
      - dev
      - staging
      - production
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "docs/**"

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Typecheck
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm format

  test:
    name: Unit Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (affected on PRs, full suite on branch pushes)
        id: run-tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo test:cov --affected
          else
            pnpm turbo test:cov
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Check coverage file availability
        id: check-coverage
        if: github.event_name == 'pull_request' && always()
        run: |
          echo "web=$([ -f apps/web/coverage/coverage-summary.json ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "contracts=$([ -f packages/contracts/coverage/coverage-summary.json ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Report web app coverage
        if: github.event_name == 'pull_request' && always() && steps.check-coverage.outputs.web == 'true'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Web App
          json-summary-path: apps/web/coverage/coverage-summary.json
          json-final-path: apps/web/coverage/coverage-final.json

      - name: Report contracts coverage
        if: github.event_name == 'pull_request' && always() && steps.check-coverage.outputs.contracts == 'true'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Contracts
          json-summary-path: packages/contracts/coverage/coverage-summary.json
          json-final-path: packages/contracts/coverage/coverage-final.json

      - name: Build PR comment
        if: github.event_name == 'pull_request' && always()
        run: |
          TEST_STATUS="${{ steps.run-tests.outcome }}"
          if [ "$TEST_STATUS" = "success" ]; then
            STATUS_LINE="✅ All tests passed"
          else
            STATUS_LINE="❌ Some tests failed — check the logs above."
          fi

          # Web coverage
          if [ -f "apps/web/coverage/coverage-summary.json" ]; then
            WEB_LINES=$(jq -r '.total.lines.pct' apps/web/coverage/coverage-summary.json)
            WEB_FUNCS=$(jq -r '.total.functions.pct' apps/web/coverage/coverage-summary.json)
            WEB_BRANCHES=$(jq -r '.total.branches.pct' apps/web/coverage/coverage-summary.json)
            WEB_ROW="| \`apps/web\` | ${WEB_LINES}% | ${WEB_FUNCS}% | ${WEB_BRANCHES}% |"
          else
            WEB_ROW="| \`apps/web\` | N/A (not affected) | — | — |"
          fi

          # Contracts coverage
          if [ -f "packages/contracts/coverage/coverage-summary.json" ]; then
            CTR_LINES=$(jq -r '.total.lines.pct' packages/contracts/coverage/coverage-summary.json)
            CTR_FUNCS=$(jq -r '.total.functions.pct' packages/contracts/coverage/coverage-summary.json)
            CTR_BRANCHES=$(jq -r '.total.branches.pct' packages/contracts/coverage/coverage-summary.json)
            CTR_ROW="| \`packages/contracts\` | ${CTR_LINES}% | ${CTR_FUNCS}% | ${CTR_BRANCHES}% |"
          else
            CTR_ROW="| \`packages/contracts\` | N/A (not affected) | — | — |"
          fi

          {
            echo "## Test Results"
            echo ""
            echo "${STATUS_LINE}"
            echo ""
            echo "### Coverage Summary"
            echo ""
            echo "| Package | Lines | Functions | Branches |"
            echo "|---------|-------|-----------|----------|"
            echo "${WEB_ROW}"
            echo "${CTR_ROW}"
            echo ""
            echo "### Thresholds"
            echo ""
            echo "| Package | Lines | Functions | Branches |"
            echo "|---------|-------|-----------|----------|"
            echo "| \`apps/web\` | ≥ 60% | ≥ 60% | ≥ 50% |"
            echo "| \`packages/contracts\` | ≥ 90% | ≥ 90% | ≥ 85% |"
            echo ""
            echo "> See detailed per-file coverage in the comments above."
            echo "> Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/pr-comment.md

      - name: Post PR comment with test results
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-results
          path: /tmp/pr-comment.md

  e2e:
    name: E2E Tests (Web)
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if web app or its dependencies changed
        id: web-changed
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            apps/web/**
            packages/contracts/**
            packages/auth/**
            packages/db/**
            packages/e2e-web/**

      - name: Determine if E2E should run
        id: should-run
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "push" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.web-changed.outputs.any_changed }}" = "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js environment
        if: steps.should-run.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        if: steps.should-run.outputs.run == 'true'
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        if: steps.should-run.outputs.run == 'true'
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        if: steps.should-run.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        if: steps.should-run.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.should-run.outputs.run == 'true'
        run: npx playwright install chromium --with-deps
        working-directory: packages/e2e-web

      - name: Build web app
        if: steps.should-run.outputs.run == 'true'
        run: pnpm turbo build --filter=@repo/web
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api
          NEXT_PUBLIC_API_VERSION: "v1"

      - name: Prepare standalone server
        if: steps.should-run.outputs.run == 'true'
        run: |
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static

      - name: Start web app in background
        if: steps.should-run.outputs.run == 'true'
        run: |
          node apps/web/.next/standalone/apps/web/server.js &
          npx wait-on http://localhost:3001 --timeout 30000
        env:
          PORT: 3001
          HOSTNAME: 0.0.0.0

      - name: Run Playwright E2E tests
        if: steps.should-run.outputs.run == 'true'
        run: pnpm test:e2e:web
        env:
          BASE_URL: http://localhost:3001
          CI: true

      - name: Upload Playwright report on failure
        if: steps.should-run.outputs.run == 'true' && failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: packages/e2e-web/playwright-report/
          retention-days: 7

      - name: Skip notice
        if: steps.should-run.outputs.run != 'true'
        run: echo "Web app not affected — skipping E2E tests."
