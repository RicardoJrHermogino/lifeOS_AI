name: Deploy Production (EC2 + ALB + ASG)

on:
  push:
    branches:
      - production
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────
  # Gate: CI must pass before deploying
  # ──────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-production:
    name: Deploy to Production (EC2 + ALB + ASG)
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    env:
      # ==========================================================
      # AWS Configuration
      # ==========================================================
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ECR_REPOSITORY_WEB: ${{ vars.ECR_REPOSITORY_WEB }}
      ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
      ASG_NAME: ${{ vars.ASG_NAME }}
      LAUNCH_TEMPLATE_ID: ${{ vars.LAUNCH_TEMPLATE_ID }}

      # ==========================================================
      # App Environment Variables
      # ==========================================================
      NODE_ENV: "production"
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_API_VERSION: ${{ vars.NEXT_PUBLIC_API_VERSION }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
      BETTER_AUTH_COOKIE_DOMAIN: ${{ vars.BETTER_AUTH_COOKIE_DOMAIN }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ──────────────────────────────────────────────
      # Validate required variables
      # ──────────────────────────────────────────────
      - name: Validate required deployment variables
        run: |
          set -euo pipefail

          require_var() {
            local name="$1"
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required variable: $name"
              exit 1
            fi
          }

          # AWS
          require_var AWS_REGION
          require_var PROJECT_NAME
          require_var ECR_REPOSITORY_WEB
          require_var ECR_REPOSITORY_BACKEND
          require_var ASG_NAME
          require_var LAUNCH_TEMPLATE_ID

          # App
          require_var NEXT_PUBLIC_APP_URL
          require_var NEXT_PUBLIC_API_BASE_URL
          require_var NEXT_PUBLIC_API_VERSION
          require_var BETTER_AUTH_COOKIE_DOMAIN
          require_var DATABASE_URL
          require_var CORS_ORIGINS
          require_var BETTER_AUTH_SECRET
          require_var BETTER_AUTH_TRUSTED_ORIGINS

          echo "✅ Required deployment variables are set"

      # ──────────────────────────────────────────────
      # Build and push Docker images to ECR
      # ──────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-production-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-production-

      - name: Build and push Web image to ECR
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "=========================================="
          echo "Building Web Docker Image (production)"
          echo "=========================================="

          docker buildx build \
            --file apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL \
            --build-arg NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL \
            --build-arg NEXT_PUBLIC_API_VERSION=$NEXT_PUBLIC_API_VERSION \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_WEB:production-latest \
            .

          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "✓ Web image pushed"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Backend image to ECR
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "=========================================="
          echo "Building Backend Docker Image (production)"
          echo "=========================================="

          docker buildx build \
            --file apps/backend/Dockerfile \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:production-latest \
            .

          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "✓ Backend image pushed"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────
      # Update SSM parameters
      # ──────────────────────────────────────────────
      - name: Update SSM parameters
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "=========================================="
          echo "Updating SSM parameters"
          echo "=========================================="

          # Store docker-compose.production.yml in SSM (base64)
          COMPOSE_B64=$(base64 -w0 docker-compose.production.yml)
          aws ssm put-parameter \
            --name "/${PROJECT_NAME}/production/docker-compose" \
            --type String \
            --value "$COMPOSE_B64" \
            --overwrite

          # Store .env in SSM (base64)
          cat > /tmp/deploy.env << ENV_EOF
          ECR_REGISTRY=$ECR_REGISTRY
          ECR_REPOSITORY_WEB=$ECR_REPOSITORY_WEB
          ECR_REPOSITORY_BACKEND=$ECR_REPOSITORY_BACKEND
          IMAGE_TAG=$IMAGE_TAG
          NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
          NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL
          NEXT_PUBLIC_API_VERSION=$NEXT_PUBLIC_API_VERSION
          DATABASE_URL=$DATABASE_URL
          CORS_ORIGINS=$CORS_ORIGINS
          BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
          BETTER_AUTH_TRUSTED_ORIGINS=$BETTER_AUTH_TRUSTED_ORIGINS
          BETTER_AUTH_COOKIE_DOMAIN=$BETTER_AUTH_COOKIE_DOMAIN
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          ENV_EOF

          ENV_B64=$(base64 -w0 /tmp/deploy.env)
          aws ssm put-parameter \
            --name "/${PROJECT_NAME}/production/env" \
            --type SecureString \
            --value "$ENV_B64" \
            --overwrite

          rm -f /tmp/deploy.env
          echo "✓ SSM parameters updated"

      # ──────────────────────────────────────────────
      # Rolling deployment via ASG instance refresh
      # ──────────────────────────────────────────────
      - name: Create new launch template version
        id: launch-template
        run: |
          echo "=========================================="
          echo "Creating new launch template version"
          echo "=========================================="

          # Create a new version with updated description (triggers instance refresh)
          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id "$LAUNCH_TEMPLATE_ID" \
            --source-version '$Latest' \
            --version-description "deploy-$IMAGE_TAG" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✓ Launch template version $NEW_VERSION created"

          # Set it as the default
          aws ec2 modify-launch-template \
            --launch-template-id "$LAUNCH_TEMPLATE_ID" \
            --default-version "$NEW_VERSION"

          echo "✓ Default version set to $NEW_VERSION"

      - name: Start ASG instance refresh
        id: instance-refresh
        run: |
          echo "=========================================="
          echo "Starting ASG instance refresh"
          echo "=========================================="

          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --strategy Rolling \
            --preferences '{
              "MinHealthyPercentage": 100,
              "MaxHealthyPercentage": 200,
              "InstanceWarmup": 300,
              "SkipMatching": false
            }' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "refresh_id=$REFRESH_ID" >> $GITHUB_OUTPUT
          echo "✓ Instance refresh started: $REFRESH_ID"

      - name: Wait for instance refresh to complete
        run: |
          echo "=========================================="
          echo "Waiting for instance refresh"
          echo "=========================================="

          REFRESH_ID="${{ steps.instance-refresh.outputs.refresh_id }}"
          MAX_WAIT=40  # 40 * 30s = 20 minutes
          POLL_INTERVAL=30

          for i in $(seq 1 $MAX_WAIT); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            PERCENTAGE=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text 2>/dev/null || echo "0")

            echo "[$i/$MAX_WAIT] Status: $STATUS | Progress: ${PERCENTAGE}%"

            case "$STATUS" in
              Successful)
                echo "✓ Instance refresh completed successfully"
                break
                ;;
              Failed|Cancelled|RollbackSuccessful|RollbackFailed)
                echo "❌ Instance refresh $STATUS"

                STATUS_REASON=$(aws autoscaling describe-instance-refreshes \
                  --auto-scaling-group-name "$ASG_NAME" \
                  --instance-refresh-ids "$REFRESH_ID" \
                  --query 'InstanceRefreshes[0].StatusReason' \
                  --output text 2>/dev/null || echo "Unknown")

                echo "Reason: $STATUS_REASON"
                exit 1
                ;;
              *)
                sleep $POLL_INTERVAL
                ;;
            esac
          done

          # Final check if we timed out
          if [ "$STATUS" != "Successful" ]; then
            echo "❌ Timed out waiting for instance refresh (status: $STATUS)"
            exit 1
          fi

      # ──────────────────────────────────────────────
      # Verify ALB health
      # ──────────────────────────────────────────────
      - name: Verify ALB target health
        run: |
          echo "=========================================="
          echo "Verifying ALB target health"
          echo "=========================================="

          sleep 30

          ALL_HEALTHY=true
          for TG_NAME in "${PROJECT_NAME}-web-tg-production" "${PROJECT_NAME}-backend-tg-production"; do
            TG_ARN=$(aws elbv2 describe-target-groups \
              --names "$TG_NAME" \
              --query 'TargetGroups[0].TargetGroupArn' \
              --output text 2>/dev/null || echo "NOT_FOUND")

            if [ "$TG_ARN" = "NOT_FOUND" ]; then
              echo "⚠️  Target group $TG_NAME not found (may have different naming)"
              continue
            fi

            HEALTH=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --query 'TargetHealthDescriptions[*].TargetHealth.State' \
              --output text)

            echo "Target group: $TG_NAME"
            echo "Health states: $HEALTH"

            if echo "$HEALTH" | grep -q "healthy"; then
              echo "✓ $TG_NAME has healthy targets"
            else
              echo "❌ $TG_NAME has no healthy targets"
              ALL_HEALTHY=false
            fi
          done

          if [ "$ALL_HEALTHY" = "false" ]; then
            echo "⚠️  Some targets are unhealthy — check AWS Console"
            exit 1
          fi

      # ──────────────────────────────────────────────
      # Summary
      # ──────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Production Deployment Complete!"
          echo "=========================================="
          echo "Strategy:     EC2 + ALB + ASG (rolling instance refresh)"
          echo "ASG:          ${{ vars.ASG_NAME }}"
          echo "Region:       ${{ env.AWS_REGION }}"
          echo "Branch:       production"
          echo "Commit SHA:   ${{ github.sha }}"
          echo ""
          echo "Web Image:    ${{ steps.build-web.outputs.image }}"
          echo "Backend Image: ${{ steps.build-backend.outputs.image }}"
          echo "LT Version:  ${{ steps.launch-template.outputs.version }}"
          echo "Refresh ID:  ${{ steps.instance-refresh.outputs.refresh_id }}"
          echo "=========================================="
